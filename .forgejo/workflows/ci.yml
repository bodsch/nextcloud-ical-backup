# Continuous integration: format, vet, test and a smoke build of the Go module.
# Runs on every push to main, on merge/pull requests, and on manual dispatch.
# Does NOT publish anything - releasing is handled by release.yml.

name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  GO_VERSION: "1.24"

jobs:
  build:
    runs-on: ubuntu-latest
#    defaults:
#      run:
#        working-directory: go
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4

      - uses: https://code.forgejo.org/actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Check formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1

      - name: Build (smoke)
        run: |
          go build -trimpath -o /tmp/nextcloud-ical-backup ./cmd/nextcloud-ical-backup
          /tmp/nextcloud-ical-backup --version
