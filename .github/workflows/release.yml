# Release pipeline

name: release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Override version (defaults to the dispatched tag name)."
        required: false
        type: string

permissions:
  contents: write   # create GitHub release, upload artifacts
  packages: write   # push container images to GHCR
  id-token: write   # reserved for future OIDC use (cosign, attestations)

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  GO_VERSION: "1.24"
  PACKAGE_NAME: nextcloud-ical-backup

jobs:
  verify:
    name: "verify (go ${{ matrix.go }})"
    runs-on: ubuntu-22.04
    if: github.event_name != 'workflow_dispatch' || inputs.release_tag == ''
    strategy:
      fail-fast: false
      matrix:
        go:
          - "1.24"
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Go version
        run: go version

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

  release-linux-amd64:
    name: "release linux/amd64 (go ${{ matrix.go }})"
    runs-on: ubuntu-22.04
    if: >
      startsWith(github.ref, 'refs/tags/')
      || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
    strategy:
      fail-fast: false
      matrix:
        go:
          - "1.24"

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Release binary
        uses: wangyoucao577/go-release-action@v1.55
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          release_tag: ${{ github.ref_type == 'tag' && github.ref_name || inputs.release_tag }}
          goos: linux
          goarch: amd64
          goversion: ${{ matrix.go }}
          binary_name: nextcloud-ical-backup
          sha256sum: true
          overwrite: true
          extra_files: LICENSE README.md config.example.toml
