# Release pipeline: build static binaries and publish them to the Forgejo
# generic package registry.
#
# Trigger: manual only (workflow_dispatch) AND only when dispatched on a
# release tag. In the Forgejo UI pick the tag under "Use workflow from".
#
# Generic package upload endpoint (see
# https://forgejo.org/docs/latest/user/packages/generic/):
#   PUT {server}/api/packages/{owner}/generic/{package}/{version}/{filename}
#
# Required repository/organization secret:
#   RUNNER_TOKEN  - access token allowed to write packages (scope: write:package).
#                    The job authenticates as ${{ github.actor }} with this token.
#
# Binaries are built with CGO_ENABLED=0; the pure-Go SQLite driver makes them
# fully static and dependency-free.

name: release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      version:
        description: "Override version (defaults to the dispatched tag name)."
        required: false

permissions:
  contents: write   # create GitHub release, upload artifacts
  packages: write   # push container images to GHCR
  id-token: write   # reserved for future OIDC use (cosign, attestations)

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  GO_VERSION: "1.24"
  PACKAGE_NAME: nextcloud-ical-backup

jobs:
  release:
    name: GoReleaser
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          # GoReleaser needs the full history to generate a changelog and
          # to derive {{ .Version }} from the tag annotation.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      # QEMU lets us build the linux/arm64 image on an amd64 runner.
      # buildx provides the multi-arch builder GoReleaser drives.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.0.0
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Login to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      # GHCR requires lowercase image paths; org/repo on GitHub may be mixed case.
      - name: Compute lowercase repository
        id: repo
        run: |
          lower=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "lower=${lower}" >> "$GITHUB_OUTPUT"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7.2.1
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          DOCKER_REGISTRY: ghcr.io
          DOCKER_REPO: ${{ steps.repo.outputs.lower }}
          # When triggered manually, tell GoReleaser which tag to use.
          GORELEASER_CURRENT_TAG: ${{ inputs.tag || github.ref_name }}
